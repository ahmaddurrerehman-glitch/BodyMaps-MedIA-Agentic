server {
    listen 80;
    server_name bodymaps.wse.jhu.edu;

    # CT scans can be 500MB+; chunks are 512KB each but we set a generous limit
    client_max_body_size 4096M;

    # Serve the built React SPA
    root /home/visitor/PanTS-Viewer/PanTS-Demo/dist;
    index index.html;

    # SharedArrayBuffer headers required by Cornerstone/NiiVue
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;
    add_header Cross-Origin-Resource-Policy cross-origin always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the gunicorn backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large CT scan uploads
        client_max_body_size 4096M;

        # Long timeouts: inference can take 10-30 minutes
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 60;
    }
}
